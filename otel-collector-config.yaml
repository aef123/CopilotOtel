receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  file:
    path: /output/otel-telemetry.json
    format: json

  otlphttp/tempo:
    endpoint: http://tempo:4318

  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write

  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [file, otlphttp/tempo]
    metrics:
      receivers: [otlp]
      exporters: [file, prometheusremotewrite]
    logs:
      receivers: [otlp]
      exporters: [file, otlphttp/loki]
