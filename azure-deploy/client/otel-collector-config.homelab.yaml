# Homelab overlay — merged over otel-collector-config.yaml by passing both files
# as --config (the collector deep-merges maps; lists are replaced wholesale).
#
# Applied only on machines whose .env sets HOMELAB_URL (see docker-compose.homelab.yaml).
# Machines without a homelab run the base config alone and export to the Azure stack only.

receivers:
  # Browser game telemetry (Bitburner). CORS-enabled so the browser can POST; kept on a
  # separate port + pipeline so game data goes ONLY to the homelab stack (not the Azure
  # work stack). Bitburner runs in a browser, so without CORS the preflight/POST is blocked.
  otlp/bitburner:
    protocols:
      http:
        endpoint: 0.0.0.0:4319
        cors:
          allowed_origins:
            - "*"
          allowed_headers:
            - "*"

exporters:
  # Homelab stack — no auth (internal-first collector on the DMZ VM).
  # Full base URL incl. port, set in .env as HOMELAB_URL, e.g. http://192.168.1.50:4318
  otlphttp/homelab:
    endpoint: ${env:HOMELAB_URL}

service:
  pipelines:
    # Replaces the base exporter lists so normal telemetry fans out to both stacks.
    traces:
      exporters: [otlphttp/remote, otlphttp/homelab]
    metrics:
      exporters: [otlphttp/remote, otlphttp/homelab]
    logs:
      exporters: [otlphttp/remote, otlphttp/homelab]

    # Bitburner game telemetry — homelab only (not forwarded to the Azure work stack).
    traces/bitburner:
      receivers: [otlp/bitburner]
      processors: [batch]
      exporters: [otlphttp/homelab]
    metrics/bitburner:
      receivers: [otlp/bitburner]
      processors: [batch]
      exporters: [otlphttp/homelab]
    logs/bitburner:
      receivers: [otlp/bitburner]
      processors: [batch]
      exporters: [otlphttp/homelab]
