events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Grafana + Dashboard UI (HTTPS on 443)
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/SERVER_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/SERVER_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Dashboard SPA (static files)
        location /dashboard/ {
            alias /usr/share/nginx/html/dashboard/;
            try_files $uri $uri/ /dashboard/index.html;
        }

        # Dashboard API proxy
        location /dashboard-api/ {
            proxy_pass http://session-api:8080/dashboard-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Legacy session API
        location /api/sessions {
            proxy_pass http://session-api:8080/api/sessions;
            proxy_set_header Host $host;
        }

        # Grafana (catch-all)
        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # WebSocket support for Grafana Live
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # OTLP ingest (HTTPS on 4318)
    server {
        listen 4318 ssl;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/SERVER_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/SERVER_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        client_max_body_size 10m;

        location / {
            proxy_pass http://otel-collector:4318;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
