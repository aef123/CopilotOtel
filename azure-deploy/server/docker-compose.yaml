services:
  nginx:
    image: nginx:alpine
    mem_limit: 128m
    mem_reservation: 32m
    ports:
      - "443:443"
      - "4318:4318"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard/dist:/usr/share/nginx/html/dashboard:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - grafana
      - otel-collector
      - session-api
    restart: unless-stopped

  otel-collector:
    # Pinned: :latest floats and a newer point release dropped Claude's
    # delta-temporality sums silently for ~7 days before being noticed.
    # Bump deliberately, never via :latest auto-pull.
    image: otel/opentelemetry-collector-contrib:0.139.0
    mem_limit: 512m
    mem_reservation: 128m
    volumes:
      - /tmp/otel-shared:/shared
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    environment:
      - TENANT_ID=${TENANT_ID}
      - OTEL_CLIENT_ID=${OTEL_CLIENT_ID}
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    mem_limit: 1536m
    mem_reservation: 512m
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo/config.yaml
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    mem_limit: 512m
    mem_reservation: 128m
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    mem_limit: 512m
    mem_reservation: 128m
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    mem_limit: 768m
    mem_reservation: 256m
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./grafana/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./grafana/dashboards/copilot-otel-metrics.json:/var/lib/grafana/dashboards/copilot-otel-metrics.json
      - grafana-data:/var/lib/grafana
    environment:
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      # Entra ID OAuth
      - GF_SERVER_ROOT_URL=https://${SERVER_DOMAIN}
      - GF_AUTH_AZUREAD_ENABLED=true
      - GF_AUTH_AZUREAD_NAME=Azure AD
      - GF_AUTH_AZUREAD_ALLOW_SIGN_UP=true
      - GF_AUTH_AZUREAD_AUTO_LOGIN=true
      - GF_AUTH_AZUREAD_CLIENT_ID=${GRAFANA_CLIENT_ID}
      - GF_AUTH_AZUREAD_CLIENT_SECRET=${GRAFANA_CLIENT_SECRET}
      - GF_AUTH_AZUREAD_SCOPES=openid email profile
      - GF_AUTH_AZUREAD_AUTH_URL=https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize
      - GF_AUTH_AZUREAD_TOKEN_URL=https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token
      - GF_AUTH_AZUREAD_ALLOWED_ORGANIZATIONS=${TENANT_ID}
      # Disable anonymous access for production
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      # Auto-assign role for new users (from .env)
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=${GF_USERS_AUTO_ASSIGN_ORG_ROLE:-Admin}
    restart: unless-stopped

  session-api:
    image: python:3.12-slim
    mem_limit: 256m
    mem_reservation: 64m
    volumes:
      - ./session-api/server.py:/app/server.py:ro
    working_dir: /app
    command: ["python", "server.py"]
    environment:
      - TEMPO_URL=http://tempo:3200
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      - LOOKBACK_HOURS=${LOOKBACK_HOURS:-24}
      - IDLE_TIMEOUT_SECONDS=${IDLE_TIMEOUT_SECONDS:-300}
      - TENANT_ID=${TENANT_ID}
      - EXPECTED_AUDIENCE=${GRAFANA_CLIENT_ID}
    restart: unless-stopped

volumes:
  tempo-data:
  prometheus-data:
  loki-data:
  grafana-data:
  letsencrypt:
    external: true
