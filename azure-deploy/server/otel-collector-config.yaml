extensions:
  health_check:
  oidc:
    issuer_url: "https://sts.windows.net/${env:TENANT_ID}/"
    audience: "${env:OTEL_CLIENT_ID}"

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        auth:
          authenticator: oidc
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: oidc

exporters:
  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write

  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  debug:
    verbosity: basic

processors:
  batch:
  # Required because the OTel JS SDK (used by Claude Code) emits Sums with
  # DELTA aggregation temporality by default, and the prometheusremotewrite
  # exporter silently drops non-cumulative metrics (Prometheus only stores
  # cumulative counters). This processor accumulates deltas into cumulative
  # totals before they reach the exporter. Without it, only the synthesized
  # target_info gauge ever lands in Prom for Claude metrics.
  deltatocumulative:

service:
  extensions: [health_check, oidc]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [deltatocumulative, batch]
      exporters: [prometheusremotewrite, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, debug]
